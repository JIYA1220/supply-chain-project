name: Supply Chain Analytics CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-html
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=xml:coverage.xml --html=test_report.html --self-contained-html
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: test_report.html

  lint:
    name: Code Quality (flake8)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: |
          flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503,E402 --exit-zero

  pipeline-smoke-test:
    name: Pipeline Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Pipeline
        run: |
          python src/01_data_cleaning.py
          python src/02_exploratory_analysis.py
          python src/03_feature_engineering.py
          python src/04_predictive_model.py
          python src/06_sql_analytics.py
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            outputs/charts/
            outputs/reports/
            outputs/sql_results/

  generate-report:
    name: Generate PDF Report
    runs-on: ubuntu-latest
    needs: pipeline-smoke-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install reportlab
      - name: Generate PDF
        run: |
          python src/01_data_cleaning.py
          python src/02_exploratory_analysis.py
          python src/03_feature_engineering.py
          python src/04_predictive_model.py
          python src/07_pdf_report.py
      - name: Upload PDF Report
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-report
          path: outputs/Supply_Chain_Analysis_Report.pdf
